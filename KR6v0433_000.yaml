front:
  text: 凡例本書國傳統的佛教學基礎知識得併漢文體佛教文獻親意圖下學生用教科書編纂本文校訂龍谷大學出版部昭和七年刊行講本八宗綱要鈔華光院圓解校訂文政十年刊本王異本校訂底本再異本校合不適當思改書名既刊本同樣講本八宗綱要鈔名句讀點訓點戰後中學高校漢文必修科目外結果漢文讀解力一般著低下現狀鑑初學者出來讀細心考慮返點送假名附獨特讀字句平假名讀假名附章節分科既刊本踏襲名目不適當思多少改上欄本文出主要項目一見列而活字大小示圖表代下欄注地名人名等梵語音表場合原語示中國日本人名出世年代明西曆年號記文中引用經論釋出據明確大正大藏經存卷數并頁數舉講本八宗綱要鈔目次序論第一章總説第一節法門大綱一第二節教説統攝二第二章歷史第一節概説三第二節印度四第三節中國七第四節日本八第三章八宗概説本論第一章俱舍宗第一節對法藏義一一第二節造論緣起一二第三節翻譯弘傳一五第四節本論宗旨一五第五節本論組織一六第六節五位七十五法一七第七節三乘因果一九第八節我空法有一九第二章成實宗第一節成實名義二第二節造論譯傳二第三節系譜宗義二一第四節賢聖階位二二第五節八十四法二三第三章律宗第一節宗名諸律二三第二節翻譯弘傳二四第三節四分律傳統二五第四節律宗相承二六第五節律宗分流二七第六節止持作持二九第七節七衆建立三三第八節判教宗致三五第四章法相宗第一節宗名所依經論四一第二節三國相承四二第三節教判四四第四節三乘五性四六第五節五位百法四九第六節五重唯識五一第七節四分五一第八節三性三無性五二第九節菩提涅槃五四第五章三論宗第一節宗名所依論五六第二節破邪顯正五七第三節真俗二諦五八第四節佛果行位五九第五節八不解釋六第六節二藏三轉法輪六一第七節三國相承六二第六章天台宗第一節宗名所依經論六四第二節相承系譜六五第三節教判六七第四節觀門行法七四第七章華嚴宗第一節宗名所依經七四第二節三國相承七五第三節教判七七第四節五教行位八一第五節佛身佛土八三第八章真言宗第一節宗名所依經八四第二節三國相承八四第三節教判八五第四節依正二報八六第五節六大四曼三密八七第六節佛身教主八八附説禪宗並淨土宗第一章禪宗八九第二章淨土宗九八宗綱要鈔解説九二

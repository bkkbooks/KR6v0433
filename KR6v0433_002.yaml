body:
  text: 第四章法相宗第一節宗名所依經論問何故名法相宗答决判諸法性相故名法相宗也泛言此宗總有四名一名唯識宗此宗大意明唯識故二名應理圓實宗一切法門皆應理故三名普為乘教攝五乘故四名法相宗其義如前今舉其一也問此宗依憑何等經論答唯識論中引六經十一部論其六經者華嚴深密如來出現功德莊嚴阿毗達磨楞伽厚嚴是也十一部論者瑜伽顯揚莊嚴集量攝論十地分別瑜伽辨中邊二十唯識觀所緣雜集論是也若總言之五部大論十支論等皆彼所依然解深密經瑜伽論唯識論等特為所學指南第二節三國相承問此教以誰為祖師乎答此教三國次第相承分明如來滅後九百年時彌勒菩薩從都率天降中天竺阿瑜遮國於瑜遮那講堂說五部大論補處薩埵位居十地是則如來在世親聞所傳非空非有中道妙理於諸教中實為明鏡如瑜伽論者卷軸百卷諸教悉判故名廣釋諸經論次有無著菩薩位居初地繼于慈尊廣傳此宗慈氏教文咸加委解釋尊所說廣造論釋次九百年時有世親菩薩無著弟也四善根中明得薩埵承于無著菩薩廣傳此宗依慈氏論盛施論釋初學小乘造五百部論後弘大乘亦造五百部論一代教文皆悉通達次有護法菩薩深解世親論遠弘慈氏教賢劫一佛明告空中外道邪執閉口而如啞異部小乘卷舌而同訥故西天外道小乘竝稱云大乘唯有此人云云次有戒賢論師傳法大將當時絶倫法相法門咸傳一代教義皆解此五大論師俱是天竺傳法匠矣次大唐初運有玄奘三藏遠涉流沙賖往天竺遂謁戒賢論師廣傳此宗戒賢論師待三藏良久即五部大論十支論等凡法相法門無遺皆傳遂還震旦盛弘此宗三千門徒七十達者四人上足一朝歸仰四海朝宗自餘諸經律論翻傳極多是大唐法相始祖天竺相承第六也次有窺基法師是三藏上足智解絶倫繼于三藏廣傳此宗斯乃百本疏主十地應迹盛德出萃舉世歸仰號慈恩大師次有淄州惠沼大師繼于慈恩大師盛敷此宗次有撲揚智周大師稟于淄洲大師廣傳此宗此竝大唐國相承次第也至于流傳日本者總有三傳一日本智通智達二人稟玄奘三藏二新羅智鳳禪師承玄奘三藏始傳日本義淵僧正弘相宗於維摩堂三日本玄昉僧正入唐受學撲揚大師還授善珠僧正自爾已來次第相承滿寺修學于今不絶竝是龍象之衆徒智辨之鋒實利咸是師子之盛德決擇之音極猛和國一宇盛敷法相何宗及之乎三國相承一無墜矣第三節教判問此宗立幾時教攝一代教答立三時教攝一代教是則解深密經誠說分明故也一者有教佛初時中為發趣彼聲聞乘者破外道實我之執明我空法有之旨諸部小乘皆此教攝且此約有義餘皆可攝故二者空教於第二時為發趣大乘者明諸法皆空之旨以破前實法之執三者中道教第三時中說非空非有之旨以破前偏有偏空之執然則初時唯約依他說有第二時唯約我執說空未是三性三無性顯了之說故前二時名為未了諍論安足處所第三時中具說三性三無性遍計所執故非有依他起性故非無是則非空非有中道妙理元離二邊直入正路是真了義非諸諍論安足處所一代之中尤甚深八萬之間特微妙華嚴深密金光明法華涅槃等諸深大乘皆此中攝諸部般若皆第二時攝諸部小乘竝初時攝問此三時者為年月次第為義類次第答學者異議不同或云年月三時云云或云義類三時云云或義類年月兼帶三時云云問第三時中中道者但約三性而立歟頗有一法中而明中道乎答此有二義一云三性對望中道云云二云一法中道云云然多是三性對望中道而已亦可一法中道云云問第二時中云何說空答此有二義一云約遍計所執密意而說皆空云云一云約三無性而說空云云第四節三乘五性問此宗立幾許乘答此宗教中立三乘五性其五性者一定性聲聞二定性緣覺三定性菩薩四不定種性五無性有情定性二乘隨自乘果竝無餘入寂菩薩種性二利行滿證大菩提無性有情法爾無有無漏種子唯有有漏種子若升進生人天之中以之為上問入寂二乘有還生乎答無此入無餘者灰身滅智諸識皆滅何有還生不定性人必回心向大都無入寂回心之時入十信初心初住入僧祇位乃至成佛衆生之機法爾有此五性差別故佛隨此一一機根授彼相應之法故必成五乘謂無性有情是人天乘三乘定性以為三乘不定種性隨應通三故有五乘若唯就出世即立三乘矣普為乘名實由茲焉問彼法華等既說一乘故定性二乘皆可成佛何強立五性乎答彼法華等是密意說且約不定性而說一乘非謂五性俱成佛也縱言一切是小分一切無始法爾五性差別不可改故問三乘修行得果之相如何答聲聞三生六十劫而證應果緣覺四生百劫而證其果菩薩經三僧祇得大覺果問就菩薩位總立幾種答因果合論總立四十一位謂十住十行十回向十地佛果也若開等覺四十二位然法雲地攝又開十信者五十一位然以十信攝于初住故慈恩大師唯立四十一位也若西明法師具立五十二位云云此四十一位束為五位一資糧位是地前三十心二加行位第十回向之後開四善根以為見道加行方便三通達位是初地入心見道位也四修習位從初地住心乃至十地是也五究竟位謂佛果是此名五位修行也問三乘之人斷何等障答二乘之人唯斷煩惱障菩薩大乘具斷二障二障者一煩惱障二所知障二障各有二謂分別俱生菩薩地前伏分別二障現行初地斷彼二障種子二地已上乃至十地地地漸斷俱生所知障至第十地斷俱生煩惱障種子二障習氣二地已上如應漸斷登佛果時一時斷盡問三祇之間各經何位答三賢四善根竝初僧祇初地至七地是第二僧祇八九十地是第三僧祇過三祇已即證佛果菩薩四十一位束為四依地前是初依供養五恆沙佛初地至六地是第二依供養六恆沙佛七八九地為第三依供養七恆沙佛第十地是第四依供養八恆沙佛三祇之間合供養二十六恆沙佛此三祇間萬行竝修六度圓足地前修相唯識地上顯性唯識第五節五位百法問此宗立幾法數攝於諸法答立於百法攝諸法盡問其百法者何答束為五位一心王有八種眼耳鼻舌身意末那識阿賴耶識是為八識二心所有法有五十一合為六位一遍行五作意觸受想思二別境五欲勝解念定慧三善十一者信精進慚愧無貪無瞋無癡輕安不放逸行捨不害四煩惱有六貪瞋癡慢疑惡見惡見開五身見邊見邪見見取見戒禁取見五隨煩惱二十忿恨覆惱慳嫉誑諂害憍無慚無愧掉舉惛沈不信懈怠放逸失念散亂不正知六不定有四悔睡眠尋伺六位合有五十一也三色法有十一眼耳鼻舌身色聲香味觸及法處所攝色此有五種極略極迥受所引定所生遍計所起色此竝法處所攝色也四心不相應行法二十四種得命根衆同分異生性無想定滅盡定無想事名身句身文身生老住無常流轉定異相應勢速次第方時數和合性不和合性也五無為法有六虛空擇滅非擇滅不動想受滅真如也是百法一切諸法略不過之問蘊處界三科攝色心等法與今百法其義如何答百法之中心王心所及以色等束為五蘊色蘊是色法受想二蘊即是心所識蘊是八識心王自餘心所等竝行蘊攝也蘊不攝無為矣其十二處色廣心略准蘊可知其十八界色心廣說亦攝無為此宗本意只明唯識一切諸法皆是唯識都無一法而在心外故慈恩大師云有心外法轉回生死覺知一心生死永棄已上然諸法差別皆唯識所變離識無別法一切境界皆歸心識第六節五重唯識總明此義有五重唯識一遣虛存實識遣遍計所執是虛存依他圓成是實故二捨濫留純識依他內境濫外故捨此唯名識三攝末歸本識攝見相二分末歸自體分本故四隱劣顯勝識隱劣心所顯勝心王故五遣相證性識遣依他事相證唯識理性故前四相唯識第五為性唯識第七節四分此心之用總有四分一相分二見分三自證分四證自證分也分量決云心用分限四種差別故名四分已上然四師異說一安慧菩薩唯立於一分是自證分也二難陀菩薩立於二分是相見分也三陳那菩薩立於三分相分見分及自證分也四護法菩薩立於四分即前列今則護法盡理之說故立四分相貌差別為心所緣故云相分能緣前境故云見分能緣見分故名自證分能緣自體分故名證自證分也此四之中相分唯是所緣無緣慮義其後三分通能所緣是則八識心王心所各有四分八識雖體各一論用即有四分是故八識各有四分也第八節三性三無性此宗明真妄義總立三性一遍計所執性是當情現相此亦分三能遍計所遍計遍計所執前二依他攝遍計所執是當情現相於無謂有虛妄執著二依他起性四緣所生諸法因緣和合有故三圓成實性諸法理性具於圓滿成就真實三義故也此三性中所執是妄有依他即假有圓成是真有遍計所執既是妄執依他圓成即妙真三性互別不相亂通然依他事法與圓成理性非一非異相不離體體不離相三十頌說三性偈云由彼彼遍計遍計種種物此遍計所執自性無所有依他起自性分別緣所生圓成實於彼常遠離前性故此與依他非異非不異如無常等性非不見此彼已上對此三性明三無性即翻遍計依他圓成如次顯相生勝義三無性矣故三十頌云即依此三性立彼三無性故佛密意說一切法無性初即相無性次無自然性後由遠離前所執我法性已上如上三性亦不離識彼三無性依三性立故唯識論云應知三性亦不離識已上又云即依此前所說三性立彼後說三種無性已上諸位修行皆觀唯識佛果所證但證唯識故萬行自唯識而起萬德依唯識而感第九節菩提涅槃此宗轉於八識而成四智其四智者一者大圓鏡智二者平等性智三者妙觀察智四者成所作智也入初地時轉六七二識而得妙觀平等二智至佛果時轉五八識而得圓鏡成事二智此時四智圓滿二轉妙果朗然其所證理有四涅槃一本來自性清淨涅槃二有餘涅槃三無餘涅槃四無住處涅槃也初一凡夫亦具中二聲聞緣覺竝得唯佛果如來具此四種此四總束名清淨法界加前四智以為五法五法三身相攝唯識論有二師解其初師意清淨法界大圓鏡智以為法身平等妙觀以為報身成所作智以為化身第二師意清淨法界是自性身四智上相是自受用平等性智所現之身他受用成所作智所現之身是變化身妙觀察智是說法斷疑智也此宗正義是第二師指南當知五位修行運運窮盡二障使習蕩蕩斷滅三祇廣劫萬善成滿攝在一念佛果速疾有漏八識轉得四智二轉妙果三身圓滿寂寂而澄照照而朗加之五乘普攝化三乘各至極一乘方便三乘真實正體智前真理寂然後得智中衆生普化依詮談旨三性三無懸鏡矣廢詮談旨四句百非息慮矣性相決判無如此宗義理極成何教及此自證三身月圓化他五乘光朗自證化他甚深廣大上乘所旨義理圓足法相宗大概如此第五章三論宗第一節宗名所依論問何故名三論宗乎答以三部論為本所憑故名三論宗問其三部者何答一中論四卷龍樹菩薩造二百論二卷提婆菩薩造三十二門論一卷龍樹菩薩造是名三論然若加智論百卷即為四論亦是龍樹菩薩造此四論中三論是通申論通申大小諸教故智論即別申論別釋大品般若故智論若具譯之可是千卷羅什三藏減於九倍取簡翻成百卷就三論中中論正破小乘兼破外道等顯大乘義百論正破外道傍破自餘顯大乘義十二門論竝破小乘外道正顯大乘深義三論所明不過二諦第二節破邪顯正凡此宗大意破邪顯正二門為軌論雖有三義唯二轍破邪則下救沈淪顯正則上弘大法振領提綱唯此二轍頗成大宗問其破邪者破何等邪答總破一切有所得見略而明之不出四見一破外道實我之邪見二破毗曇實有之執見三折成實偏空之情見四摧有所得大乘見解內外盡破大小遍折啻有所得通皆遣破故無不被破莫不被責此謂是宗破邪義也問其顯正者顯何等正答破邪之外無別顯正破邪已盡無有所得所得既無言慮無寄然對破邪故亦有顯正一源不窮則戲論不滅毫理不盡則至道不顯無源不窮故戲論斯滅無理不盡故玄道是通寄言談正莫不顯明問若爾其顯正之義如何答至道是玄極言論不及言有則返愚語無則非智善吉所呵身子被責非有非無非亦有亦無非非有非無言語道斷心行處滅湛湛無寄寥寥絶據不知何以而銘強名顯正矣也問言語俱絶有無俱遣即是空義何關顯正答既遣有無何住於空佛道大體實無寄者乎有無俱絶故無有所得顯正之旨窮于此矣第三節真俗二諦問既遣有無若爾緣生諸法云何得立答緣生諸法是假有假有即無所得矣二諦所以而立四中依之而成以俗諦故不動真際建立諸法以真諦故不壞假名而說實相故空宛然而有有宛然而空色即是空空即是色旨在茲矣二諦唯是教文不關境理以寄緣故有二諦以理實故泯二諦有是空之有故言有非有空是有之空故言空非空非有故即有談空非空故即空說有諸佛說法常依二諦即其義也此宗所顯即此無得正觀而已故古人云八不妙理之風拂妄想戲論之塵無得正觀之月浮一實中道之水已上以無得故假名諸法法爾森羅准上可知第四節佛果行位問此宗云何談成佛果答一切衆生本來是佛六道衆生本自寂滅無迷亦無悟豈論成不成乎故此宗迷悟本無湛然寂滅然假名門中論於迷悟成不成耳由此義故成佛有遲有速由根有利鈍故也一念成覺是短三祇成佛即長一念不礙三祇三祇不妨一念一念即三祇三祇即一念如一夕眠夢百年事百年之事還故一夕經三祇故萬行積成在一念故佛果速疾問三祇積行者經幾次位答三祇菩薩經五十一位然後至佛果故此宗立五十二位也故此宗意覺體本有迷故有生死返迷還源但拂客塵時本有覺體宛爾而顯此名為始覺佛當知對迷故立悟對悟有迷悟發則無迷無迷故何悟無迷無悟迷悟本無本來寂滅迷悟染淨是假名施設無得正觀即妙極至道也第五節八不解釋問其八不者何答不生不滅不斷不常不一不異不去不來遣八迷故說此八不此即今宗所顯理也此宗釋一切法有四種釋義一依名釋義二因緣釋義三見道釋義四無方釋義一切法門以此可釋亦立四重二諦一有為俗諦空為真諦二有空為俗非空非有為真三空有非空非有為俗非非有非非空為真諦四以前為俗非非不有非非不空為真斯乃破外道毗曇有所得大乘等故也第六節二藏三轉法輪問此宗立幾許教攝諸教乎答立二藏三轉法輪攝一代教二藏者一聲聞藏是小乘教二菩薩藏是大乘教大小二教此中攝盡此依智論三轉法輪者一根本法輪華嚴是也二枝末法輪阿含已後齊法華來竝是也三攝末歸本法輪法華經是一代諸教一切攝盡此出法華經矣大小二乘顯理同一隨機故教異諸大乘經顯道無二對緣故有別然判諸大乘經各立等勝劣三判一切教敢無偏解第七節三國相承問此宗以誰為祖師乎答祖師血脈三國相承師師繼踵此宗實明初以大聖文殊師利菩薩為高祖次馬鳴菩薩以為次祖次龍樹菩薩妙弘此宗龍樹授龍智菩薩及提婆菩薩此二大輪師竝肩施化龍智授于清辨菩薩清辨授智光論師智光授師子光菩薩彼提婆菩薩智解甚深辨才絶倫大破外道盛弘佛教論師此宗授羅𬑟羅菩薩羅𬑟羅授沙車王子王子授羅什三藏羅什三藏姚秦之世來至震旦大翻經論專傳此宗四論即是什師所翻翻譯之美古今流譽深智之才三國天竺龜茲震旦所尊門徒繞仰如衆星圍白月朝代歸宗似衆流會大海生肇融睿竝肩相承影觀恆濟同志美贊曇濟大師繼踵弘傳以授道朗大師道朗授于僧詮大師僧詮授于法朗大師法朗授于嘉祥大師嘉祥大師本胡國人也幼隨父來漢地從法朗大師受學三論實是法門綱領拔出古今威德巍巍現象王之威智辨明明奪日月之照製作繁多廣施部帙三論法華竝為心府大小兩乘悉窮玄底三論甚盛專在此師諸祖之中特定大祖解釋盡理不可加之遂以三論授高麗慧灌僧正僧正來日本廣傳此宗慧灌授福亮僧正福亮授智藏僧正智藏竝授道慈律師禮光法師矣道慈授善議大德善議授勤操僧正勤操授安澄大德如是相承今不絶明師挺出互弘大義明哉三國傳承不墜故義淨三藏云天竺有二宗瑜伽與中論云云教理甚深何宗及此布貴道詮有言四河派流同出無熱七宗分鑣俱出三論當知諸宗是三論之末三論是諸宗之本豈有不入龍樹心府之宗乎矣諸宗悉崇為大祖者乎第六章天台宗第一節宗名所依經論問何故名天台宗答從山為名此宗從彼山而起故也問此宗何教為所憑乎答以法華為所依本經以判一代諸教然判教綱網諸義咸引故伊人法師義例云一家教門所用義旨以法華為宗骨以智論為指南以大經為扶疏以大品為觀法引諸經以增信引諸論以助成觀心為經諸法為緯織成部帙不與他同已上第二節相承系譜問此宗以誰為祖師乎答以天台智者大師為宗師矣然慧文禪師依智論立一心三觀以授南嶽慧思禪師慧思禪師靈山聽法華憶在當時行法華三昧位登六根淨智論三智一心中得之文中論三諦偈妙領心府深發定慧三昧成就觀解圓明遂授法天台智者大師智者大師亦昔於靈山同聽法華謁於南嶽大師之時妙得憶識修法華三昧位居五品建一家大宗身具十德慧文南嶽唯提義綱至于天台大師廣立教時具判一代此宗盛興啻在此祖次有章安大師承天台大師廣傳此宗天台唯散說章安悉結集以成一宗之典籍以作一家之綱目次智威大師承章安大師廣傳此宗智威授慧威大師慧威授玄朗大師玄朗授妙樂大師妙樂大師廣解祖文竝製記章天台止觀玄義文句如應作輔行釋籤疏記諸家記章不及今師自餘祖文無不解判故古今特依承諸方歸為所憑唯今記家妙得祖意頗符大宗義通法師知禮法師淨覺法師等皆承此後妙樂大師授法道邃和尚則法門靈府也行滿道暹及智雲等皆稟妙樂竝肩行化互為龍象爰日本傳教大師渡大唐國謁道邃和尚廣傳此宗瀉瓶無遺傳寫此盡遂還日本弘之睿嶽義真和尚慈覺大師智證大師如是等祖師先德互相承流傳于今不絶日本一國無處不弘異國諸州傳聞盛學雖時末法人之歸仰無過此宗貴哉大矣第三節教判問此宗立幾時教判一代教又明何法門乎答一宗大義教觀二門言教門者義解養神佛道圓開故言觀門者觀行進登證覺妙發故其教門者四教五味一乘十如是等也其觀門者十二因緣二諦四種三昧三惑義等也判一代教約教有四教約時有五時四教之中亦有二種一化法四教是釋義之綱目也二化儀四教即判教之大綱也兩種四教合為八教問且化法四教者何答一三藏教一切小乘此教中攝二通教諸大乘中通被三乘此教分齊三別教諸大乘中不與小共獨被菩薩即此教攝四圓教諸大乘中圓融相即無礙法門即此教攝初三藏教者小乘教中諸部分流然取要唯四一有門小乘即毗曇是二空門小乘是成實論三亦有亦空門謂昆勒論四非有非空是迦旃經彼昆勒論及迦旃經未傳震旦且就有門毗曇所說而明之者此教之中明三乘修行得果之相先聲聞乘有七賢七聖其七賢者一五停心二別相念處三總相念處此三是外凡順解脫分位也四暖法五頂法六忍法七世第一法此四是內凡順決擇分位也其七聖者一隨信行二隨法行三信解四見得五身證六時解脫七不時解脫初二竝見道鈍根者名隨信行利根者名隨法行鈍根者入修道名信解利根者入修道名見得此信解見得二人得滅盡定還名身證鈍根人得羅漢果名時解脫利根人得羅漢果名不時解脫雖有七聖唯是四果聲聞得果極速三生極遲六十劫即得證也其緣覺乘即有二種一部行獨覺二麟喻獨覺部行出佛世故部類衆多麟喻唯獨一故不知佛世極速四生極遲百劫後得果也菩薩經三僧祇亦徑百劫然後菩提樹下成佛三乘俱斷見思惑矣三乘所觀互各不同聲聞觀四諦緣覺觀十二因緣菩薩修六度三乘得果竝入無餘灰身滅智此教明生滅四諦十二因緣六度二諦等法是界內事教也二通教者此有四門多明空門此教明三乘共十地其十地者一乾惠地是外凡位二性地是內凡位三八人地四見地斷三界見惑是初果也五薄地即一來果六離欲地是不還果七已辦地是羅漢果聲聞從初至此乃至無餘灰斷八支佛地除習氣入空觀緣覺至此證果入寂九菩薩地是出假位菩薩至此動逾塵劫出假利生道觀雙流十佛地菩薩最後身斷餘殘習七寶樹下天衣為座成道乃至入寂此教明無生四諦十二因緣二諦等法此界內理教也三別教者亦有四門多用亦有亦空門此教明五十二位一十信是外凡位從假入空二十住是習種性位初住斷三界見惑次之六住斷三界修惑後三住除前惑習氣竝塵沙惑此位空觀成就傍習假中三十行性種性位正習假觀傍習中觀破塵沙惑四十回向是道種性修中道觀伏無明也此住行向是內凡位五十地聖種性六等覺上二竝破無明分證中道名分聖位七妙覺是極聖位破無明證佛果也即七寶為座成道矣此教明無量四諦十二因緣等此界外事教也此宗明障總立三惑一見思惑二塵沙惑三無明惑見思是界內惑故藏通二教三乘所斷塵沙無明是界外惑故別圓二教而所斷也五十二位具伏斷此三惑圓教六即亦爾四圓教者亦有四門多約非有非空門此教立六即位一理即一切衆生一念心即如來藏理此心即具三諦妙理不可思議是名理即二名字即聞上所說一實菩提於名字中通達解了知一切法皆是佛法是為名字即三觀行即是五品位十心具足十法成乘觀也讀誦經典更加說法兼行六度正行六度修此等行故名五品位是外凡位也四相似即是六根清淨鐵輪十信位也初信斷三界見惑次六信斷三界思惑後三品斷習氣竝界外塵沙伏無明惑是內凡位也五分真即是十住十行十回向十地等覺也於四十一位中各斷一品無明各顯一分中道之理竝八相成道而度衆生普門示現而益機根名為分聖位也六究竟即等覺一轉入于妙覺佛果圓滿斷證窮極此教明無作四諦十二因緣等問四教所談佛果三身之中何乎答藏通二教是應身於中藏教劣應身通教勝應身也別教他受用身圓教自受用身理智冥合融通無礙三身即一如來也問四教之佛居何等土乎答此宗立四種佛土一同居土凡聖雜居故藏教所談劣應身佛居此土中於中有二一同居穢土如娑婆等二同居淨土如安養等二方便有餘土在三界外唯三乘人離三界身住彼淨土通教所談勝應身佛即居此土三實報土別教十地圓教十住已上菩薩斷無明惑顯中道理住於彼土若據教主別教所明他受用身四寂光土唯佛實身住彼淨土機根離絶佛佛境界即是四德波羅蜜周遍寂照理智冥合法身所住四教佛居如此四土也以此四教判如來一代大小諸教莫不窮盡化法四教大概如此次化儀四教者一頓教如華嚴經二漸教阿含方等般若之三時也三不定教機解不同同聽異聞聞大解小聞小解大等然互相知名不定教四祕密教一會之說對機異說或說小之座說一實法或說大之座而說餘法然互不相知故名祕密教是總名化儀四教也當知化儀所說不出化法化法說儀不過化儀故立八教以為判解即大綱網目其五時者華嚴阿含方等般若法華涅槃化儀次第一代說教不過此五名為五味第四節觀門行法此宗百界千如三千世間一念之中頓具不縱不橫建立二諦總有七重四種三昧為行方法一心三觀具足圓滿相即自在無礙圓融即凡見佛即佛現凡三千在理同名無明三千果成咸稱常樂今法華妙旨實在茲矣諸教之中此教最長諸宗之中為深奧超八極圓厥旨深高速疾大果又妙矣第七章華嚴宗第一節宗名所依經問何故名華嚴宗答以華嚴經為其所憑故云爾也問華嚴總有幾經乎答若委論之有十類別然今取要言只有三本一上本華嚴十三千大千世界微塵數偈一四天下微塵數品二中本華嚴四十九萬八千八百偈一千二百品此二本經攝在龍宮不傳閻浮三下本華嚴十萬偈三十八品此傳閻浮五印盛弘此云三本華嚴也下本經十萬頌內傳譯震旦經於三譯東晉朝代覺賢三藏翻成六十卷得彼梵本三萬六千偈次大唐朝喜覺三藏翻成八十卷得彼梵本四萬五千偈後大唐朝般若三藏貞元年中翻成四十卷唯是入法界一品也第二節三國相承問此宗以誰為祖師乎答香象大師以為高祖然具言之立於七祖第一馬鳴菩薩第二龍樹菩薩第三震旦元祖杜順禪師是文殊應迹居終南山製華嚴法界觀五教止觀十玄章等流通此宗諡號帝心尊者第四智儼禪師承杜順師盛弘此宗製作多多居雲華寺號雲華尊者第五香象大師稟智儼禪師廣敷華嚴一朝國師四海重寶講經感天雨花開義口出五光大唐則天皇后諡號賢首菩薩經論解釋製造極多大經本疏餘經別章諸論義記一宗總義解釋無遺義理盡述凡華嚴甚盛啻在此祖第六清凉大師承香象大師弘華嚴教智解深廣兼通諸宗以此圓宗為其心府製大疏演義鈔及自餘章疏其數多多一朝歸宗以為國師十誓堅固終身不懈居清凉山諡號華嚴菩薩第七宗密禪師承清凉大師盛弘華嚴兼通諸宗製作甚多居圭峯草堂寺諡號定惠禪師此之七祖淨源法師奉敕記之若據震旦杜順已下唯立五祖日本所玩特仰四祖杜順智儼香象清凉流傳日本道璿律師為其始祖律師承香象大師律師授良辨僧正自爾已來至今繼跡血脈相承敢不中絶第三節教判問此宗立幾宗教攝一代法門乎答立五教十宗攝一代法門其五教者一小乘教二大乘始教三大乘終教四頓教五圓教也初小乘教者如來出世為說一乘開化衆生故菩提樹下說本教一乘高山先受光而獲大益日輪初耀照而覺群機然小志衆生不堪聞深法故如來於一乘中分別三乘漸誘淺機以令趣大道此中小乘教是如來權方之施設暫授羊鹿以誘小志假設化城而息勞窮故所說義理隨機淺近所指果證唯存狹劣如此誘攝漸令趣大乘故也問此經中所說義理其相如何答所說義理衆多無量且舉一二謂言法相則七十五數為無為之相歷然談法源則六識三毒染不染之義宛爾四果證入只存入寂三祇進趣專在五分外道邪見之幢如塵而碎分段見思之員如雲而晴然未盡法源故諍論極多二十部黨類即此教相貌也次大乘始教者此教既出小乘始入大乘故少雖影似小教多談直進深義三祇修行趣極證之大果二空顯證高出偏小之情百法鏡明決擇分明故諍論斯止法苑即平四智心品自用之月明三身妙果斷證之光圓八識建立法相廣張二諦法門重重深奧二障伏斷衆惑氷消六度修行自他竝運妙理冲遠實非小乘所窺大義深玄迥超羊鹿權車然真如無知緣起之途未通事理不即相融之門未開故五性分機出世有成不成二乘有差佛果立趣不趣是有性無性之隔別定性不定之差異也故此教無性不出生死定性都無回心即此教意也退雖出大衆上座之黨進未及隨緣皆成之談始教之名實由此矣次終教者此教諸相融即入不二之定門真如隨緣榮森羅之法苑故如來藏海通八識而氷水有性無性唱皆成而虛空依他無性即是圓成衆生煩惱即是涅槃第一義空該真妄而寥寥生住異滅離三時而絶絶是即大乘深義方此中盡法義建立既此教窮然未談事事無礙未明主伴具足及泯絶之門未絶升進之相立位是故猶名為漸教也次頓教者此教一念不生即名為佛法相之差異都亡泯真性之妙理直顯現一切所有唯是妄想一切法界皆是絶言五法三自性俱空亡八識二無我雙呵遣階位悉泯佛不都絶然未知森焉諸法皆悉毗盧果德浩然衆相俱是佛海妙相故尚號淺教也後圓教者此教明事事無礙窮諸法之體相談主伴無盡彰果相之圓備故十玄緣起融諸法而即入六相圓融通衆相而無礙一即多而無隔多即一而圓通攝九世以入剎那舒一念而該永劫三生證果還彰本成十信道圓沒同果海行布之施設備經多劫圓融之妙義現身證果行布不礙圓融圓融不妨行布故得一切相即相融此是教意也如來所說一代教文淺深雖區不出此五實判諸法而無遺攝法門而莫餘此之五中初一小乘後一一乘中三竝三乘教始終二教是漸合為漸頓二教漸中分始終故成三也此五總束以為一大善巧廣大法綱攝法分齊圓教備足四法界中收攝窮盡故凡一代最長諸宗玄底莫如此圓教唯此教窮極華嚴如須彌諸教似群山諸教皆會華嚴大海三乘竝出今經廣苑如此教名為根本法輪圓極自在教也次十宗者上之五教約宗分之不過十宗一我法俱有宗二法有我無宗三法無去來宗四現通假實宗五俗妄真實宗六諸法但名宗已上宗竝小乘教中開之七一切皆空宗是始教也八真德不空宗是終教也九相想俱絶宗是頓教也十圓明具德宗是圓教也第四節五教行位問五教行位其相如何答小乘教中行位分齊全同小論大乘始教亦明三乘位其菩薩乘立五十一位以其十信立為位故此據直進機也或立三乘共十地等此據回心機也終教一切衆生皆成佛道立四十一位以其十信不為位故等覺一位開合之異頓教泯絶無寄本不立位圓教有二一同教一乘全同終教二別教一乘全別三乘與彼不同故此有二門一次第行布門因果次第進修證入故二圓融相攝門因果融攝無礙即入故以行布故經不可說不可說微塵數劫以圓融故一念速疾證佛果也此教立三生成佛見聞解行證入是也圓教義理四法界中一切攝盡無有餘矣一事法界二理法界三事理無礙法界四事事無礙法界也第五節佛身佛土問此宗佛之身土立幾種乎答五教不同且圓教中土立三類皆是華藏莊嚴世界淨穢融即一多無礙佛有十身衆生身國土身業報身聲聞身等一切諸法無非佛體萬德莊嚴包攝無窮故言斷則一斷一切斷言證則一成一切成十身具足毗盧遮那最初顯開無盡玄宗一切諸法此中皆盡為淺近機漸漸分流乃至法華會三歸一遂令悟入華嚴一乘一代化儀唯舒此經終窮攝歸唯入此經舒則一代八萬森羅交絡卷則九會妙說深廣該攝大方廣佛華嚴經理智冥合題名已顯華嚴海會善財童子一生證入後會實明欲得速疾大果無過此經教理甚深何宗及此十玄緣起花鮮矣六相圓融月朗矣衆經上首諸宗尊主洋洋矣蕩蕩矣不可得稱者唯此經宗而已第八章真言宗第一節宗名所依經問何故名真言宗答此以大日經蘇悉地經等祕密真言教為其所憑為云爾也第二節三國相承問此宗誰人而傳弘於之乎答如來滅後七百年時龍猛菩薩開南天鐵塔遇金剛薩埵受職灌頂然後廣流傳之金剛薩埵親承大日如來大日如來是教主也龍猛菩薩授之龍智菩薩自爾已來善無畏三藏金剛智三藏一行禪師不空三藏惠果和尚互各繼跡血脈流傳至于日域之流傳者弘法大師渡於海波謁惠果阿闍梨廣傳此宗遂還日本盛開此宗自爾已來日本一國花洛田舍無不受學至今不絶凡此教盛于日域偏是弘法大師之力也大師是大權應迹盛德絶倫行業無雙顯密諸宗無遺兼通大小三藏皆悉窮盡護法感通威驗才藝豈有及大師之人乎實照千古之明燈耀來後之日月也遂於高野山入定人天歸敬八部尊重內證外用不可思議矣第三節教判問此宗立幾教乎答立十住心攝大小顯密等諸教窮盡無遺問其十住心者何答一異生羝羊心二愚童持齊心三嬰童無畏心四唯蘊無我心五拔業因種心六他緣大乘心七覺心不生心八一道無為心九極無自性心十祕密莊嚴心是名十住心初三住心是世間乘於中第一是三惡道第二即人乘第三是天乘後七住心是出世間乘於中第四聲聞第五緣覺乘總是小乘後五大乘他緣覺心是三乘教一道極無即一乘教第十是金剛乘教最尊最極之實教也九種住心皆是權乘竝是因位第十住心獨是實果第四節依正二報大日如來心王覺體塵數諸聖心數眷屬五智所成依正二報本有金剛界自在大三摩耶現覺諸法本初不生大菩提心不壞金剛光明心殿是依報也三十七尊九會曼荼十三大會四重曼荼重重帝網塵剎聖衆是正報也依正無盡自在圓滿高超諸宗而聳聳廣包衆典而廓廓然則顯乘大果未上此堂出世小聖豈得入室乎是以四大乘宗以空寂而謂實理九界情執覆心城而未開顯唯此密教明見實理深入心城密嚴華藏塵數諸尊森羅而住一切衆生萬德妙用歷然而具故一切衆生皆毗盧遮那也一切諸相悉是覺王境界第五節六大四曼三密此宗建立六大總明佛體四種曼荼此上相貌三密相應即其業用六大之中前五大者是理第六識大即智理智之上各有相用四曼三密所以建立智即金剛界理是胎藏界是名兩界兩部大日所以而成六大即大日如來一切諸法不離六大六大法性周遍諸法故一切諸法無非大日大日如來周遍法界當知兩部者是大日如來理智之德也理德無量故胎藏有四重聖衆智德無量故金剛界有三十七尊兩部不二為理智冥合第六節佛身教主此宗佛立四身自性受用變化等流是名四種法身五方五智以成四身即身成佛大覺速證毗盧覺王登之方極即事而真森然諸相宛爾諸法皆是真如顯教是釋迦說密教即大日說是故二教說主炳然差別若得實義即二佛無二離此釋迦別無大日故十住階級捨劣得勝皆是遮情之分齊十心諸法平等怛然即是表德之義門常差別門常平等門不二而二二而不二表德故一塵不棄皆毗盧妙德遮情通顯乘表德局密乘故此教意一切諸法皆是大日真如即我身佛法即吾體四重祕釋重重深妙三密業用密密祕奧若離此教永無成佛之路求出含生豈不信行真言祕教大概如此附說禪宗竝淨土宗第一章禪宗夫諸宗義理冲邈難測今渧一毛以霑初心日本所傳自昔已來共許所玩唯此八宗然八宗外禪宗及淨土教盛而弘通彼禪宗者佛法玄底甚深微妙本來無一物本無煩惱元是菩提達磨西來不立文字直指人心見性成佛不同餘宗森森萬法相違法義重重扣論天竺二十八祖以心傳心彼第二十八祖達磨大師梁世傳之漢地乃至六祖次第相承然五祖之下南北二宗始分六祖南宗之末漸分五家道璿律師承北宗之禪傳之日本又傳教大師自大唐國傳於此宗名佛心宗近來名德亦自宋朝而傳之矣日本諸處盛以弘傳第二章淨土宗又淨土宗教日域廣行凡此教意具縛凡夫欣樂淨土以所修業往生淨土西方淨土緣深于此土念佛修行劣機特為易生淨土後乃至成佛泛而言之一切諸行回向淨土名淨土門修行萬行期於此成名聖道門諸教諸宗皆是聖道欣求往生是淨土門源出於起信論繼在龍樹論教天親菩薩菩提留支曇鸞道綽善導懷感等乃至日域咸作解釋競而弘通日本近代已來此教特盛若加此二宗即成十宗然常途所因其啻八宗而已以前所列諸宗次第非是淺深次第唯隨言列爾列何可得故且如上列之耳人身聖教難受難值適得受值豈得默止乎仍舉管見以結來緣微功不朽必證菩提矣文永五年戊辰正月二十九日於豫州圓明寺西谷記之豫一宗教義尚非所軌餘宗教觀一無所知唯舉名目聊述管見仍錯謬極多正義全闕諸有識見者質之華嚴宗沙門凝然生年草九八宗綱要鈔解說一凝然號示觀仁治元年一二四三月六日伊豫國愛媛越智郡高橋生十六才睿山延曆寺山門不共菩薩戒受十八東大寺戒壇院別受戒受圓照弟子二十才通受戒受師圓照戒壇院中興八宗兼學名匠凝然圓照八宗學更律證玄淨因天台密教聖守華嚴宗性受京都出禪參淨土長西真言真空聽八宗孔老諸子百家說精通二十九才八宗綱要鈔二卷著三十七才東大寺舍那殿華嚴講三十八才圓照沒戒壇院住八宗特華嚴弘律必要說講經授戒遑後宇多天皇自南都幸彼菩薩戒受國師號賜後彼宮中召華嚴五教章講元亨元年一三二一九月五日八十二才戒壇院寂鷲尾山葬凝然著書極多華嚴經探玄記洞幽鈔一二卷華嚴賢聖章六卷五教章通路記五二卷律宗瓊鑑章六卷梵網戒本疏日珠鈔五卷四分戒本疏贊宗記二卷法華經疏慧光記六卷維摩經疏菴羅記四卷勝鬘經疏詳玄記一八卷淨土教誨章四卷淨土觀音記二卷等數一百六十余部一千余卷稱現存大部分奧書製作年時場所及動機等記彼生國伊豫以外余南都離著述專念窺二八宗綱要鈔卷末文永五年戊辰正月二十九日於豫州圓明寺西谷記之以下略華嚴宗沙門凝然生年草九記鎌倉中期文永五年一二六八凝然二十九才著作明了上下二卷鎌倉時代佛教書例多問答體形式書序論初佛教法門數多㷌二藏三藏出旨明次三國佛法流傳歷史略說八宗分派弘傳述日本傳來宗派八宗說而本論俱舍成實律法相三論天台華嚴真言順序八宗歷史教義綱要簡潔記述終附說禪淨土二宗添詳十宗凝然本書著法然淨土宗開百年滿榮西入宋㷌朝七十余年道元曹洞宗開僅三十余年過禪淨土二宗在來八宗比歷史淺附說簡略記述本論說八宗標題八宗綱要鈔名從凝然当時八宗綱要述佛教全宗派概說附說禪淨二宗一應加爾來本書佛教初學者必讀書如何廣多人讀現在殘注疏如實物語而本書作七百年後今日八宗歷史教義要領纏入門書本書第一推凝然自身卷末奧書豫一宗教義尚非所軌餘宗教觀一無所知唯舉名目聊述管見仍錯誤極多正義全闕諸有識見者質之謙遜述佛教研究長足進步今日宗學專門家見一部首肯所說本書價值失瑕瑾日本人書平明漢文通佛教教理理解上格好入門書推賞足三八宗順序著者自卷末以前所列諸宗次第非是淺深次第唯隨言列爾列何可得故且如上列之耳記決無秩序排列小乘大乘三乘一乘顯教密教次第點弘法大師十住心判據考華嚴宗沙門凝然華嚴宗後真言宗配顯密次第場合至極当然彼八宗兼學學者各宗公平取扱示共彼宗派的偏見少窺凝然數撰述中本書密接關係舉三國佛法傳通緣起三卷內典麈露章一卷律宗綱要二卷淨土源流章一卷等本書論尽點補或一層簡略要點纏類併參考終本書刊行本並注釋書舉次如八宗綱要二卷成實元龜二年刊八宗綱要私記附分科四卷勤息義城明治二二年刊八宗綱要二卷承應二年刊釋科傍注八宗綱要二卷町元吞空明治二三年刊校訂八宗綱要一卷圓解文政一年刊八宗綱要講述三卷吉谷覺壽明治二七年刊八宗綱要啓蒙録五卷楠潛龍明治一一年刊八宗綱要講義一卷織田得能明治三四年刊八宗綱要鈔講解六卷福田義導明治一一年刊八宗綱要講義一卷境野黃洋明治四二年刊八宗綱要考證二卷聞號述藤井玄珠補明治一四年刊八宗綱要講義一卷佛教學會大正二年刊八宗綱要鈔科本二卷酒井最正明治一五年刊八宗綱要講義一卷和田龍造大正五年刊冠注八宗綱要一卷瀨邊惠燈杉原春洞明治二年刊八宗綱要講話二卷境野黃洋大正五年刊冠導八宗綱要四卷杉原春洞瀨邊惠燈明治二一年刊八宗綱要問題講述一卷日野安住大正六年刊八宗綱要講義二卷柳澤迎存明治二一年刊八宗綱要講義一卷森達立大正一二年刊標注八宗綱要一卷黑田真洞明治二一年刊八宗綱要講義一卷富井隆信大正一三年刊啓蒙八宗綱要二卷町元吞空明治二一年刊八宗綱要解說一卷柏原祐義昭和二年刊冠注八宗綱要一卷掘江慶了明治二二年刊

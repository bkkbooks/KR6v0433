body:
  text: 凝然大德述序論第一章總說第一節法門大綱問佛教有幾門耶答薄伽教法總有無量門且舉大途則八萬四千釋尊一代五十箇年所說法莫不攝盡問何故法門數量必爾答為欲對治一切衆生八萬四千諸塵勞故所以法門必有八萬四千數問此等法門為唯約大乘為通小乘乎答大小二乘各立八萬四千法門也如俱舍云牟尼說法蘊數有八十千已上加之諸小乘經多說法有八萬四千此等竝是小乘所立如大乘教中盛談此義文據甚多不待言論故大小兩乘皆各立有八萬四千也第二節教說統攝問此等法門如何攝束答法門雖多不過二藏及以三藏取攝諸教皆悉窮盡厥之五藏十藏十二分教等門亦不出三藏焉問且二藏者何答一聲聞藏是小乘也二菩薩藏是大乘也大小兩乘各立有八萬四千者即此義也此二藏義出智度論及莊嚴論諸家咸引以判大小問次其三藏者何答一素坦覽藏古云修多羅此翻契經古單云經二毗奈耶藏古云毗尼此云調伏古云律三阿毗達磨藏古云阿毗曇此云對法古云無比法是論義也此云三藏如次詮於定戒慧學三藏是能詮教三學即所詮義以攝法義無有遺餘問云何攝哉答如來一代對機授法有機即授處處散說然說教分齊不過三藏故結集之時諸聖者等結為三藏悉結集已以傳世間問此之三藏通大小乘哉答爾通也如莊嚴論等具明之故於聲聞菩薩二藏各有三藏經律論是也第二章歷史第一節概說問此等教文古今傳通其相如何答如來在世不用典籍隨聞依行即得證益如來滅後始有典籍傳通以開衆生眼目依之迦葉波等結小乘三藏於畢鉢之窟場阿逸多等集大乘教法於鐵圍之中間于是摩訶迦葉秉聖法而繼玄綱阿難尊者持契範而利群生末田商那各提義綱優婆毱多獨彰美號佛滅百年瀉瓶無遺法匠五師傳持有功百歲已後諸聖亦出互傳聖典各秉大法然隨諸聖隱沒法義非無滅如阿難入定胎衣不測商那入滅衆經隨隱雖然遺餘不少殘教實多故正法千年乃至末法隨時秉持隨處流傳至于流傳諸處者五印諸國乃至日域其餘諸國不可稱計各弘聖典竝興佛事第二節印度今且述天竺震旦日域三國弘傳之相者傳聞如來滅後四百年間小乘繁昌異計相興大乘隱沒納在龍宮就中一百年間純一瀉瓶百餘年後異計競起是以摩訶提婆徒吐五事之妄言婆粗富羅未捨實我之堅情正量經量諍大義而紛紜西山北山起異見而猥綸遂使四百年間二十部競起五印土中乃至五百交諍五百年時外道競興小乘稍隱況大乘耶爰馬鳴論師時將六百始弘大乘起信論等是時則造外道邪見卷舌皆亡小乘異部閉口咸伏大乘深法再興閻浮衆生機感已趣正路次者有龍樹菩薩六百季曆七百初運紹于馬鳴獨步五印所有外道無不皆摧所有佛法皆悉傳持三本華嚴獨含胸藏四辨文河妙控江海廣造論藏而青於藍深窮佛法而寒於氷凡斯二大論師竝是高位大士也馬鳴則古之大光明佛今則示迹於第八地龍樹則昔之妙雲相佛今則寄位於初歡喜俱本佛也竝垂迹也智辨超倫其事宜哉爰大聖應現化緣已盡息化歸本衆生業緣亦復雜起邪見還深依之九百年時無著菩薩出於世間利益衆生夜升都率現稟慈氏晝降閻浮廣教衆生然衆生執深尚不從化故即請慈尊自降說法慈尊應請降中天竺阿瑜遮那講堂說五部大論如瑜伽論卷軸一百八萬法門深談奧義一代教文莫不皆判故名廣釋諸經論矣是時衆生邪見悉伏正路同趣進入妙麗慈尊升天之後無著繼化閻浮此時代中世親施化始弘小乘廣制五百部論後學大乘亦造五百部論故世舉號千部論師加之訶梨跋摩之成實論衆賢論師之順正理此時製矣如來滅後一千年間大乘宗義未分異計千一百年之後大乘始起異見故千一百年護法清辨諍空有於依他之上千七百歲戒賢智光論相性於脣舌之間如金剛與金剛似巨石與巨石厥餘諸大論師龍智提婆青目羅𬑟羅陳那親勝火辨智月等竝是四依大士衆生所歸古今挺出蘭菊諍美諸宗各取以為祖匠衆生互憑以為上首如此論師古來繼出照燭五印拔濟衆生是為天竺弘通之相也第三節中國如震旦國者如來滅後一千年末迦騰始來竺蘭次至始傳三寶漸弘五乘自爾已來漢魏晉宋齊梁陳隋唐宋此等朝中三藏諸師各傳佛教互弘聖法至如翻經三藏或從西至此或從此往還大小三藏皆悉翻傳顯密二宗互各弘通是以羅什玄奘之窮翻經妙也果感韋陀之天告矣覺賢曇無之稱傳譯美也遂得海龍之神護矣其餘高僧崇佛法之者或金陵淨影月澄于八不顯實之水或南嶽天台花鮮于一心三觀之薗慈恩淄洲風凉于三草二木之梢香象清凉玉明于十玄六相之臺加之光寶二師窮對法而明明礪宣兩家瑩戒律而歷歷况於成實之大義惠影獨麗真言之密教行果俱朗乎自外諸德不可稱計竝弘大道互通佛教威德巍巍數感天給妙解蕩蕩頻見心佛如此高僧古今之間多哉大哉豈言語之所及乎此謂震旦弘傳之相也第四節日本至如日本國者人王第三十代欽明天皇御宇第六年乙丑當梁大同八年十一月從百濟國聖明王獻金銅釋迦像一軀及幡蓋若干經論天皇歡喜即見崇之于時臣下雖不敬之遂建寺宇安置佛經其後漸漸三寶興建第三十一代敏達天皇元年壬辰正月一日聖德太子誕生和國更弘佛法廣滿天下伽藍諸處度人無量守屋逆臣被定慧弓箭高麗兩僧得弘通稱譽降伏邪見紹隆三寶拔濟衆生施作佛事千古百來何處過之偏是上宮太子善巧之力也自爾已來高僧頻出廣傳佛法大聖垂迹遍弘三寶慧灌僧正傳三論深義玄昉僧正弘法相大乘華嚴圓宗道璿律師傳之戒律天台鑒真和尚弘之傳教大師重興天台弘法大師盛開真言俱舍成實各有傳承此等諸德或從唐至此或從此往還自餘諸師弘傳甚多竝前後玩如上法或汲玉泉之流或傳慧日之光或受清凉之滿月或為玉花之門葉或彳南山貞松之下或遊西湖靈芝之薗或青龍深窮海底或大雲遍覆四面大小兩乘性相二宗教觀二門顯密二教各各傳通不可稱計七大諸寺竝肩鑽仰南北二京諍美依學互是龍象之徒衆俱為人天之大師厥餘邊方亦隨弘通自古至今繼踵不絶末法味薄教海本深欲釣其奧不能及大哉不可得而稱者也此謂日域弘傳之相也第三章八宗概說問三國弘傳之相略知既爾然今日域所傳佛法總有幾許請重明之答日域教自昔所玩本只八宗至今不改其之中間非無異宗雖然古今共許所玩其啻八宗而已問其八宗者云何答言八宗者一俱舍宗二成實宗三律宗四法相宗五三論宗六天台宗七華嚴宗八真言宗也問此八宗中幾是小乘幾是大乘乎答俱舍成實及律此三宗皆是小乘也法相三論天台華嚴及以真言此之五宗竝是大乘也問此之八宗所談義理各可得聞乎答諸宗義趣深奧難知一宗尚嗜未聞况於八箇宗乎故唯列名目粗述一義耳本論第一章俱舍宗第一節對法藏義問何故名俱舍宗乎答俱舍者是本論名具言之即論題云阿毗達磨俱舍論論之一字是漢語餘之六字竝梵語阿毗此云對達磨此云法俱舍此云藏謂對法藏論也謂無漏慧等名之為對法對有二義一者對向涅槃故二者對觀四諦故法有二義一勝義法謂是涅槃也二法相法通四聖諦謂無漏慧對向對觀涅槃四諦故藏有二義一者包含二者所依包含義者此論包含發智論等諸勝義言故名為藏對法之藏依主釋也所依義者此論依彼發智論等而造故爾全取本論對法藏名有對法藏故名對法藏是有財釋論具題名其義如此今此俱舍以為宗故名俱舍宗也第二節造論緣起問此論如來滅後經幾許年誰人造乎答此論如來滅後九百年時世親菩薩之所造也二十部中是薩婆多部也源出婆沙勢插諸教婆沙是本發智六足如來滅後四百年初迦濕彌羅國有國王名迦膩色迦其王敬信尊重佛經有日請僧入宮供養王因問道僧說不同王甚怪焉問脅尊者曰佛教同源理無異趣諸德宣唱奚有異乎尊者答曰何說皆正隨修得果也佛既懸記如折金杖王聞此語因為問曰諸部立範孰最善乎我欲修行願尊者說尊者答曰諸部之中莫越有宗王欲修行宜遵此矣王即歡喜令結此部三藏法門有德諸僧四方雲集凡聖極多不可煩亂遂簡凡僧唯留聖僧聖僧尚繁簡去有學唯留無學無學復多不可總集於無學內定滿六通智圓四辨內間三藏外達五明方堪結集所留德聖唯有四百九十九人遂以世友尊者足成五百人矣即以世友尊者推為上座於是五百聖衆初集十萬頌釋咀怛覽藏次造十萬頌釋毗奈耶藏後造十萬頌釋阿毗達磨藏即大毗婆沙是也五百羅漢既結集已刻石立誓唯聽自國不許外國方敕夜叉神守護城門不令散出然世親尊者舊習有宗後學經部將為當理於有宗義懷取捨心欲定是非潛名重往時經四歲屢以自宗頻破他部悟入尊者被詰莫通尊者入定知是世親私告之曰此部衆中未離欲者知長老破必相致害長老可速歸還本國于時世親至本國已講毗婆沙若一日講便造一偈攝一日中所講之義刻赤銅葉書寫此偈如此次第成六百頌攝大毗婆沙其義周盡標頌香象擊鼓宣令誰能破者吾當謝之竟無一人破斯偈頌將此偈頌使人齎往迦濕彌羅國時彼國王及諸僧衆聞皆歡喜謂弘己宗悟入知非告怪諸人遂請造釋世親論主即應王請為釋本文凡八千頌後見彼釋果如悟入羅漢所言于時悟入尊者弟子衆賢論師造論破俱舍名俱舍雹論令世親見世親即讚改名即為順正理論彼衆賢論師亦造顯宗論譯成四十卷順正理譯成八十卷故知此俱舍論源出婆沙論第三節翻譯弘傳問此論興起既九百年時其傳東夏是何時耶答此論翻時即有二代初陳朝真諦三藏譯成二十卷即自作疏有五十卷亡逸不傳後唐朝玄奘三藏永徽年中於慈恩寺譯成三十卷今即此本也然則此論既世親論主所造故以世親菩薩為本祖師大唐國中遍學三藏妙翻傳之門人普光法師寶法師各作疏釋之及餘諸師莫不皆玩乃至傳于日本于今不絶相承繼跡諸寺競學第四節本論宗旨問此宗唯述有宗歟頗有兼餘乎答此論正述有宗故所立義本薩婆多而製造之然時朋彼經部之義故論文云迦濕彌羅義理成我多依彼釋對法已上又云經部所說不違理故已上取捨二宗顯密意趣依此等文其義可知問此論以何為其宗旨答既述有宗故說一切諸法實有以為其宗若密言之非無經部義今約顯意唯是有宗三世實有法體恆有總是此宗所說義也然說三世實有諸說不同即有四說一法救尊者云由類不同三世有異二妙音尊者云由相不同三世有異三世友尊者云由位不同三世有異四覺天尊者云由待不同三世有異今世親論主竝評此四家世友尊者以為最善若經部宗過未無體唯現是有此俱舍論既是對法故此論藏第五節本論組織問此論總明何等義乎答此論三十卷總有九品一界品二根品三世間品四業品五隨眠品六賢聖品七智品八定品九破我品略頌云界二根五世間五業六隨三賢聖四智二定二破我一是名俱舍三十卷其破我品無別正頌聚經中伽陀而已此九品中初之二品總明有漏無漏後之六品別明有漏無漏就總明中初界品明諸法體次根品明諸法用別明六中初之三品別明有漏後三品別明無漏明有漏中世品明果業品明因隨眠品明緣明無漏中賢聖品明果智品明因定品明緣其破我品明無我理一部三十卷九品始終所明義理分齊如此第六節五位七十五法問此宗幾種攝諸法乎答七十五法攝諸法盡七十五法者一者色法此有十一五根五境及無表色二者心法此唯一也六識心王總為一故三者心所有法有四十六分為六位大地法十大善地法十大煩惱地法六大不善地法二小煩惱地法十不定地法八合有四十六名六位心所大地法十者俱舍頌云受想思觸欲慧念與作意勝解三摩地遍於一切心已上大善地法十者又同頌云信及不放逸輕安捨慚愧二根及不害勤唯遍善心已上大煩惱地法六者同頌云癡逸怠不信惛掉恆唯染已上大不善地法二者頌云唯遍不善心無慚及無愧已上小煩惱地法十者頌云忿覆慳嫉惱害恨諂誑憍如是類名為小煩惱地法已上不定地法八者略頌云尋伺及悔眠貪瞋與慢疑四者不相應行此有十四俱舍頌云心不相應行得非得同分無想二定命相名身等類已上五者無為此有三種一擇滅無為二非擇滅無為三虛空無為此名七十五法七十五中前七十二竝是有為後三是無為一切諸法不過此二有為法中有漏無漏無為是無漏故此宗中建七十五攝於諸法莫不窮盡第七節三乘因果問此宗之中三乘因果云何建立乎答於三乘中聲聞經三生六十劫修行得果方便有七階果即四級緣覺經四生百劫修因證果因行積集直登無學無有多階唯一向果菩薩經三阿僧祇劫修諸波羅蜜百劫之中植相好業最後身中於金剛座斷結成佛化緣已盡入無餘涅槃斯乃聲聞觀四諦緣覺觀十二因緣菩薩修六度第八節我空法有問此宗明幾空乎答唯明生空不談法空言生空者即遣我執五蘊之中無有人我唯是五蘊和合聚成假名為人無有實人如此觀故證我空理然其法體三世實有由此義故他宗名為我空法有宗也第二章成實宗第一節成實名義問何故名成實宗乎答以成實論為所依故名成實宗言成實者釋成如來所說三藏之中實義故也故彼論師述懷文云故我欲正論三藏中實義已上出彼論第一初第二節造論譯傳問此論如來滅後幾年誰人造乎答如來滅後九百年中薩婆多宗學者俱摩羅陀上足弟子有訶梨跋摩嫌師見解是甚淺劣簡取諸部最長之義以為一類而成宗矣姚秦朝代羅什三藏翻譯弘之一部十六卷二百二品震旦諸師多造章疏乃至日域以依學之第三節系譜宗義問此之論宗二十部中正何部攝又最長義者是何等義乎答定成實論所依本部諸解不同或云依多聞部或云依經部或云探大釋小或云依曇無德部或云取諸部長小乘諸部長或云依化地部又梁三大法師謂光宅寺法雲法師開善寺智藏法師莊嚴寺僧旻法師此三家竝云成實論是大乘云云天台嘉祥竝判小乘南山靈芝俱云分通大乘與四分律同計如此諸師異說不同然淨影天台已後多分共評云成實論是小乘中長云云但南山律師教是小乘義通大乘云云小乘之中多云成實多依經部云云或曇無德部云云其最長義者此宗之中具明二空故觀立二種一者空觀如瓶中無水五蘊之中無人我故是人空觀也二者無我觀如瓶體無實五蘊諸法假名故是法空觀也既明二空故其義最長第四節賢聖階位問若爾可斷二執顯二空故答不然雖談二空唯斷見思不斷所知障啻是智解甚深故此論中明二十七賢聖以攝賢聖階位其二十七者一隨信行在聞思位二隨法行在四善根位三無相行即前二人入見道故此之三人名預流向四須陀洹果五一來向六一來果七不還向不還果中開十一人一中般二生般三有行般四無行般五樂慧六樂定七轉世八現般九信解十見得十一身證竝前七人合成十八名有學人自下九人竝是無學一退法相二守護相三死相四住相五可進相六不壞相七慧解脫八俱解脫九不退相竝前十八合成二十七賢聖也第五節八十四法八十四法攝諸法盡雖未進入大乘於小乘中尤為優長實可怪矣是大乘歟一切諸法唯歸一滅諦空理寂然諸法此上立實法堅情如氷釋假有萬像如林森虛通妙道其旨深矣第三章律宗第一節宗名諸律問何故名律宗乎答律為所依故名律宗問律有幾部答律有諸部謂二部五部十八五百是如來在世五十箇年隨機散說滅後弟子升座結集名為一部八十誦律大毗尼藏佛滅百年五師瀉瓶純是一味未分異見一百年後漸分二部五部及二十部乃至五百異見競鼓猶如浩波經論亦然三藏等教一類分故其中律部隨計異成故一大藏分成諸部如此諸部數多不出二十部內故律部中有二十部天竺之間諸部竝弘第二節翻譯弘傳然傳震旦總有四律及以五論其四律者一者十誦律譯成六十一卷是薩婆多部律也二者四分律譯成六十卷是曇無德部律也三者僧祇律譯成四十卷此根本二部中窟內上座也大衆名通二部故四者五分律譯成三十卷此五部中彌沙塞部律也迦葉遺律唯傳戒本廣律未流四律竝翻震旦悉行然獨流後代唯曇無德部四分律宗而已其五論者一毗尼母論二摩得勒伽論此依薩婆多律三善見論此解四分律四薩婆多論此釋十誦律五明了論此依正量部律自外毗奈耶律及新譯有部諸律竝傳震旦然四分一律此土緣深昔智首律師已前諸部雜亂未是專玩智首律師南山律師或製五部區分鈔或檢震旦初興受體專依四分而明受體唯憑曇無而談隨行自爾已來乃至日域唯傳此部故且就四分一律述興起之根元明傳弘之由來第三節四分律傳統問四分律宗何時興乎答未分已前一味瀉瓶如來在世隨機散說佛滅百年結集流傳一百餘年時曇無德羅漢隨見誦出以為一部此是時此部始而分出問震旦日本何時傳乎答曹魏之世法時尊者創受戒姚秦之世覺明三藏始傳廣律是震旦傳戒之由來也至日域昔天平年中日本榮睿普照此二師往于唐朝請大明寺鑒真大和尚即應請來至日本途難極多而不奈之十有二年海中忍難逆浪六回志都不倦第六度時遂來至日本請入東大寺聖武天皇王子百官歡喜感悅即毗盧舍那殿前築壇行於受戒天皇皇后乃至四百餘人竝皆受戒後遷大佛殿西別建於戒壇院自爾已來年年行受于今不絶日本諸州戒律教宗厥時廣行莫不依玩又建唐招提寺傳弘戒律逮至于今續續不絶戒律教宗傳流日域偏是鑒真大和尚之力也第四節律宗相承問此宗立幾祖師答自迦葉尊者至于宋朝近來其數總別甚多謂佛是教主理在絶言迦葉尊者阿難尊者末田地尊者商那和須尊者優婆毱多尊者曇無德此云法正尊者曇摩迦羅此云法時尊者法聰律師道覆律師慧光律師道雲律師道洪律師智首律師南山律師周秀律師道恆律師省躬律師慧正律師法寶律師元表律師守言律師無外律師法榮律師處恆律師擇悟律師允堪律師擇其律師元照律師是也若別據當律初興至于南山律師驗為九祖自法正尊者而取之故南山已後次第同前若依日本弘傳南山律師弘景律師鑒真大僧正法進大僧都如寶小僧都豐安僧正等是也第五節律宗分流問四分律宗頗有異解分流乎答唐朝有之謂相部法礪律師終南山道宣律師西大原寺東塔懷素律師各立異義門葉互諍此名律三宗鑒真和尚相部大疏南山虬文竝傳日本諸寺諸山竝令講通彼唐朝三宗後唯南山遺自餘諸家廢絶不行良以南山宗義受隨相稱行相備足大小途和解行相應故也古今諸師俱競嘆美諸宗賢哲竝玩依學如行事鈔七十三家互作記解自界他方俱致承奉誰有如祖師賢聖所嘆人何其如此乎泛而言之四分律藏翻譯已來諸師製疏將二十家然取要言之不過三疏慧光律師略疏四卷相部律師中疏十卷智首律師廣疏二十卷此名三要疏然唐朝三宗礪宣素義以攝束諸解多在此三相部大疏嵩嶽律師作記解釋飾宗義記十卷是也智首律師大疏既是南山所承故與南山而一途也東塔律師四分開宗記十卷獨流行天下互謂盡美俱稱指南唐朝之末東京競起又玄惲律師毗尼討要三卷與餘家少異矣四分大小等疏是也俱多分與南山同此六家章疏日本竝傳焉今盛依學南山一家兼奉行嵩嶽新家之義三宗律義之不同恐繁不述南山律師製作章疏總五大部一行事鈔三卷分為十二卷二戒疏四卷分為八卷三業疏四卷分為八卷四拾毗尼義鈔三卷本是三卷然下卷逸唯有上中今分四卷五比丘尼鈔三卷分為六卷戒本羯磨竝作注解及小部律章自餘諸文部帖多多不可具舉南山律宗正所依學即此五大部等也其本所依即四分律六十卷是言其論釋即善見論是第六節止持作持問此宗明何法義答此宗明戒也有二種一止持戒五篇諸止惡門二作持戒說戒等諸修善門如來所說一切諸戒二持攝束皆悉窮盡故本律正宗所詮義理唯此止作二持而已初二部戒本是名止持後二十犍度是名作持二部戒本者僧尼二部也比丘比丘尼所持名具足戒戒本所說二部戒中初明僧戒僧有二百五十戒分為八段一波羅夷此有四戒淫盜殺妄也二僧殘此有十三戒一故出精戒二觸女人戒三粗語戒四嘆身索供養戒五媒嫁戒六有主房戒七無主房戒八無根謗戒九假根謗戒十破僧違諫戒十一助破僧違諫戒十二汗家擯謗違諫戒十三惡性拒僧違諫戒三二不定一屏處不定二露處不定四尼薩耆波逸提此有三十長衣離衣長鉢乞鉢等也五波逸提此有九十小妄語兩舌語掘地壤生飲酒非時食等也六四提舍尼蘭若受食學家受食等也七百衆學戒齊整著衣戲笑跳行等也八七滅諍現前毗尼憶念毗尼等此之八段具攝二百五十戒攝束八段以為五篇一波羅夷二僧殘此二攝罪即如前段三波逸提合前捨墮單墮為一總攝百二十戒四提舍尼如前五突吉羅合二不定百衆學七滅諍以為一篇總有一百九戒此就果罪及急要義立為五篇自外諸罪立於六聚而收攝之一波羅夷二僧殘三偷蘭遮四波逸提五提舍尼六突吉羅是為六聚若開吉羅即為七聚五全如前六惡作七惡說七聚之中夷殘墮罪及提舍尼攝罪同篇門偷蘭一聚攝五篇外聚門吉外一切因果輕重諸罪惡作惡說攝篇門吉及餘一切因果吉罪故離七聚更無有罪六聚七聚攝罪盡故次明尼戒比丘尼戒本律說相唯有三百四十一戒束為六段一八波羅夷二十七僧殘三三十捨墮四一百七十八單提五八提舍尼六百衆學尼無二不定其七滅諍古來諍論或可有或不可有云云今南山律師義必可有云云本律文略故可七段故加七滅總有三百四十八戒此亦不出五篇准比丘戒可知此為二部廣律本律前半所說法門分齊如此止持戒也次作持門犍度法者本律後半二十犍度一受戒犍度二說戒犍度三安居犍度四自恣犍度五皮革犍度六衣犍度七藥犍度八迦絺那衣犍度九俱腅彌犍度十瞻波犍度十一呵責犍度十二人犍度十三覆藏犍度十四遮犍度十五破僧犍度十六滅諍犍度十七尼犍度十八法犍度十九房舍犍度二十雜犍度此名二十犍度此等竝是作持戒也然二段本律非無互通止持有作作持有止雖有互通就多分判前後兩段以配二持若對五大部者事鈔戒業兩疏名三大部戒疏即止持行相防止隨持事詳業疏即作持修行羯磨攝僧義明事鈔雙明止作衆四人已上自一人共二人三人三行二持備足其尼鈔一部別明尼二持義鈔一部多解止持故祖師諸文唯在二持矣此二持戒有總有別總而言之一切諸善皆二持攝別而言之唯就戒律一宗明之今二持者且就戒律一門言之若就總門非無其義第七節七衆建立問僧尼具戒局于此歟答不然僧尼具戒無量無邊若定數限且隨緣制故僧尼戒量各有三重僧戒三者廣則無量中則三千威儀六萬細行略則二百五十尼戒有三重者廣則無量中則八萬威儀十二萬細行略則三百四十八戒經說五百戒是有名無相大智律師云托境而言戒則無量且列二百五十為持犯綱領已上尼戒亦爾故僧尼二衆受具戒時竝得如此無量無邊等戒量等虛空境遍法界莫不圓足故名具足戒其五戒八戒十戒六法等皆從具戒中抽之漸誘機根以為具戒方便漸漸進登遂成具足無願位故是故總言戒有四位五戒八戒十戒具戒若加六法總可五類佛法七衆所以建立其七衆者一比丘二比丘尼此之二衆竝具足戒三式叉摩那此受六法四沙彌五沙彌尼此竝十戒六優婆塞七優婆夷此竝五戒前五衆是出家衆後二在家式叉沙彌及沙彌尼戒相標數雖十戒等至于護持竝同具位其八齊戒為在家衆授出家戒然位唯在家優婆塞優婆夷之攝七衆之外無別衆故其五戒者一不殺生戒二不偷盜戒三不邪淫戒四不妄語戒五不飲酒戒也八齊戒者前五同上但改邪淫以為不淫六香油塗身戒七歌舞觀聽戒八高廣大床戒九非時食戒薩婆多論云八箇是戒第九是齊齊戒合數故有九也已上言十戒者前九同上第十捉金銀寶戒其六法者一殺畜生二盜三錢三摩觸四小妄語五飲酒六非時食也此七衆中男衆有三比丘沙彌及優婆塞女衆有四即餘四是第八節判教宗致問此宗立幾教攝諸教乎答南山律師立化制二教以攝一代教亦名化行二教其化教者經論所詮定慧法門四阿含等是也其制教者律教所詮戒學法門四分律等是也今此宗部即律藏教以戒為宗戒行清淨定慧自立故先持戒制禁業非然後定慧伏斷煩惑為道制戒本非世福三乘聖道非戒不立故如來最初制戒意在茲矣已上南山御釋問如常途云五戒八戒感人天報十戒具戒唯得應果云云此義如何答義未必然若持五八戒任因感報即唯人天十戒具戒任因感果即是小果依此義故常途云爾若約意樂其義不爾故大智律師云戒有四位五八十具若約鈍根通為世善若論上智俱作道基已上故知戒法隨機有異此是今宗之所談祖師建立之意致也問四分律宗大小乘中正是何乎答律宗諸家所判不同慧光律師云四分一律宗是大乘云云法礪玄惲等師竝云唯是小乘云云南山律師云此四分宗義當大乘已上今依此義盛為所憑故業疏中立五義分通謂沓婆回心施生成佛施一切衆生皆共成佛道識了塵境相召佛子捨財用輕遙超餘部實為深義束上諸戒總有四科一者戒法如來所制法通萬境故二者戒體受者所發心府領納故今四分宗依成實論非色非心為體三者戒行受者隨持三業運造故四者戒相美德外彰持相可軌故一切諸戒咸具此四問今宗所立及祖師意致大小乘中本何行果答此教所依本是小乘四分本律元被小乘故然義當大乘機根漸進故當分小乘故小無不兼分通大乘故大無不期此是今教所說所旨若據南山律祖意者如來一代所說法門大小諸教分為三教一性空教一切小乘即此中攝二相空教一切大乘淺教悉攝三唯識圓教一切大乘深教悉攝今四分宗即性空教中之一分唯識圓教是祖師域心圓融三學無礙圓行故業疏中明諸宗所談戒體出三宗義有宗空宗竝性空教攝圓教妙體是唯識教也大小二宗各立三學且大乘圓教三學者戒即護三聚淨戒藏識種子以為其體定慧則唯識妙行止觀竝運以為其相戒即定慧無一法而非定慧定慧即戒無一法而非戒此名圓融三學行相其中戒者即前所標三聚淨戒謂攝律儀戒一切諸惡皆悉斷捨故攝善法戒一切諸善皆悉修行故攝衆生戒荷負衆生遍施利益故此之三聚亦圓融行故三聚互攝諸戒融通如不殺生即具三聚乃至一切諸戒皆爾隨持一戒三聚全具雖是一行廣攝萬行故雖一念頓經三祇不壞三祇而立一念不退一念而經三祇長短無礙生佛平等諸法互遍相即無盡豈非深妙乎攝善攝生且略不論其律儀戒亦有三種一別解脫戒二定共戒三道共戒其初別解脫中有三業即身語意所持戒也身語二戒有共不共意業之戒唯是不共故聲聞所受唯此身語一分共門之分齊也四分律等所說戒相即此分齊但四分律分通意戒由此義故有小乘戒今大乘宗此共門戒入三聚中會歸大乘故小乘律所說戒行皆是三聚圓頓大戒更無別相純一圓極彼七衆軌則全同小律律儀戒中建立之故此則南山大師教觀宗旨學者受隨解行之域心也然受此三聚戒有通受有別受三聚通受故云通別受律儀故云別今祖師所立白四羯磨圓意戒法即當彼別受矣然後受菩薩戒者即當通受矣故今律宗學者通別二受遍納壇場四分梵網竝護戒相通別二受名出法相之家義在南山之林五篇七聚制起聲聞之叢行亙大乘之薗明乎瑜伽大論之誠說矣南山高祖之定判矣行者域心啻在此宗大覺妙果豈夫賖乎
